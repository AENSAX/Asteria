name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # node:sqlite (used by the unit tests) requires Node 22+
          node-version: 22
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn check
      - run: yarn test
